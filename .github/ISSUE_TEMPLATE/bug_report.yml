name: Bug Report
description: "For security vulnerabilities, please see SECURITY.md instead of filing a public issue."
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
  - type: textarea
    attributes:
      label: "`opendocuments doctor` output"
      description: Run `opendocuments doctor` and paste the output here
  - type: input
    attributes:
      label: OpenDocuments Version
      placeholder: "0.1.0"
  - type: input
    attributes:
      label: Node.js Version
      placeholder: "20.x"
