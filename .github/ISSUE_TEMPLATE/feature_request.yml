name: Feature Request
description: Suggest a feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the details below.
  - type: textarea
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Category
      options:
        - Parser (new file format)
        - Connector (new data source)
        - Model (new AI provider)
        - RAG Engine (search/retrieval)
        - CLI
        - Web UI
        - API / SDK
        - Security
        - Other
  - type: dropdown
    attributes:
      label: Estimated Effort
      description: How complex do you think this is?
      options:
        - "Good First Issue (< 2 hours)"
        - "Medium (2-8 hours)"
        - "Complex (> 8 hours)"
        - "Not sure"
  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Have you considered other ways to achieve this?
